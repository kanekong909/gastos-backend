name: Backup diario KASH → Google Drive

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Instalar googleapis
        run: npm install googleapis

      # ==================== DESCARGAR BACKUP ====================
      - name: Descargar backup de Railway
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.ADMIN_TOKEN }}" \
            https://gastos-backend-production-fa36.up.railway.app/api/actividad/admin/backup \
            -o backup.json

          echo "Backup descargado: $(wc -c < backup.json) bytes"
          ls -lh backup.json

      # ==================== VERIFICAR BACKUP ====================
      - name: Verificar backup
        run: |
          if [ ! -s backup.json ]; then
            echo "❌ Backup vacío o no descargado, abortando"
            exit 1
          fi

          echo "✅ Archivo generado ($(wc -c < backup.json) bytes)"

          python3 - << 'EOF'
import sys
import json

with open("backup.json", "r", encoding="utf-8") as f:
    data = json.load(f)

print("Tipo de dato:", type(data).__name__)

if isinstance(data, dict):
    print("Claves encontradas:", list(data.keys()))
    
    if "datos" in data:
        total = sum(len(v) for v in data["datos"].values() if isinstance(v, (list, tuple)))
        print(f"✅ OK - {total} registros en la clave 'datos'")
    elif "data" in data:
        print("⚠️ Se encontró clave 'data' en lugar de 'datos'")
        if isinstance(data["data"], list):
            print(f"Total registros: {len(data['data'])}")
        else:
            print("La clave 'data' no es una lista")
    else:
        print("⚠️ Estructura diferente. Claves disponibles:", list(data.keys()))
else:
    print(f"✅ Es una lista con {len(data)} elementos")
EOF

      # ==================== SUBIR A GOOGLE DRIVE ====================
      - name: Subir a Google Drive
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          node << 'EOF'
          const { google } = require('googleapis');
          const fs = require('fs');

          try {
            const credentials = JSON.parse(process.env.GDRIVE_CREDENTIALS);
            const auth = new google.auth.GoogleAuth({
              credentials,
              scopes: ['https://www.googleapis.com/auth/drive.file']
            });

            const drive = google.drive({ version: 'v3', auth });

            const fecha = new Date().toISOString().slice(0, 10);
            const nombre = `kash-backup-${fecha}.json`;

            drive.files.create({
              requestBody: {
                name: nombre,
                parents: [process.env.GDRIVE_FOLDER_ID]
              },
              media: {
                mimeType: 'application/json',
                body: fs.createReadStream('backup.json')
              }
            }).then(response => {
              console.log(`✅ Backup subido correctamente: ${nombre}`);
              console.log(`File ID: ${response.data.id}`);
            }).catch(err => {
              console.error('❌ Error al subir a Google Drive:', err.message);
              if (err.response) console.error('Detalles:', err.response.data);
              process.exit(1);
            });

          } catch (e) {
            console.error('❌ Error general:', e.message);
            process.exit(1);
          }
          EOF
